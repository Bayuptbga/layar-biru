<svg xmlns="http://www.w3.org/2000/svg" width="300" height="160" viewBox="0 0 300 160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#110008"/>
      <stop offset="100%" style="stop-color:#1a0d2e"/>
    </linearGradient>
    <radialGradient id="redglow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#cc0033;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0"/>
      <stop offset="60%" style="stop-color:#000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="160" fill="url(#bg)"/>

  <!-- Red glow center -->
  <rect width="300" height="160" fill="url(#redglow)"/>

  <!-- Film perforations left -->
  <rect x="0" y="0" width="13" height="160" fill="#000" opacity="0.6"/>
  <rect x="3" y="8"  width="7" height="10" rx="2" fill="#1a0d2e"/>
  <rect x="3" y="28" width="7" height="10" rx="2" fill="#1a0d2e"/>
  <rect x="3" y="48" width="7" height="10" rx="2" fill="#1a0d2e"/>
  <rect x="3" y="68" width="7" height="10" rx="2" fill="#1a0d2e"/>
  <rect x="3" y="88" width="7" height="10" rx="2" fill="#1a0d2e"/>
  <rect x="3" y="108" width="7" height="10" rx="2" fill="#1a0d2e"/>
  <rect x="3" y="128" width="7" height="10" rx="2" fill="#1a0d2e"/>
  <rect x="3" y="148" width="7" height="10" rx="2" fill="#1a0d2e"/>

  <!-- Film perforations right -->
  <rect x="287" y="0" width="13" height="160" fill="#000" opacity="0.6"/>
  <rect x="290" y="8"  width="7" height="10" rx="2" fill="#1a0d2e"/>
  <rect x="290" y="28" width="7" height="10" rx="2" fill="#1a0d2e"/>
  <rect x="290" y="48" width="7" height="10" rx="2" fill="#1a0d2e"/>
  <rect x="290" y="68" width="7" height="10" rx="2" fill="#1a0d2e"/>
  <rect x="290" y="88" width="7" height="10" rx="2" fill="#1a0d2e"/>
  <rect x="290" y="108" width="7" height="10" rx="2" fill="#1a0d2e"/>
  <rect x="290" y="128" width="7" height="10" rx="2" fill="#1a0d2e"/>
  <rect x="290" y="148" width="7" height="10" rx="2" fill="#1a0d2e"/>

  <!-- Decorative horizontal lines -->
  <line x1="20" y1="22" x2="280" y2="22" stroke="#cc0033" stroke-width="0.5" opacity="0.3"/>
  <line x1="20" y1="138" x2="280" y2="138" stroke="#cc0033" stroke-width="0.5" opacity="0.3"/>

  <!-- 18+ badge glow behind -->
  <circle cx="150" cy="68" r="36" fill="#cc0033" opacity="0.15" filter="url(#softglow)"/>
  <!-- Badge ring -->
  <circle cx="150" cy="68" r="30" fill="none" stroke="#cc0033" stroke-width="1.8" opacity="0.9"/>
  <circle cx="150" cy="68" r="33" fill="none" stroke="#cc0033" stroke-width="0.5" opacity="0.35"/>

  <!-- 18+ text -->
  <text
    x="150" y="79"
    text-anchor="middle"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="28"
    font-weight="900"
    fill="#cc0033"
    filter="url(#glow)"
  >18+</text>

  <!-- Bottom overlay -->
  <rect width="300" height="160" fill="url(#overlay)"/>

  <!-- KONTEN DEWASA label top -->
  <text
    x="150" y="16"
    text-anchor="middle"
    font-family="'Arial', sans-serif"
    font-size="7"
    font-weight="700"
    letter-spacing="3"
    fill="#cc0033"
    opacity="0.7"
  >KONTEN DEWASA</text>

  <!-- Klik Untuk Menonton bottom -->
  <text
    x="150" y="151"
    text-anchor="middle"
    font-family="'Arial Narrow', 'Arial', sans-serif"
    font-size="11"
    font-weight="700"
    letter-spacing="1.8"
    fill="#E9ECF6"
    opacity="0.9"
  >KLIK UNTUK MENONTON</text>
</svg>
